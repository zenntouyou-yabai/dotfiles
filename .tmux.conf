# === Prefix ===
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# === General ===
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# === Split panes (intuitive keys) ===
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# === New window inherits current path ===
bind c new-window -c "#{pane_current_path}"

# === Pane navigation (vim-style) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Pane resize (vim-style) ===
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# === Status bar ===
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-style "bg=colour39,fg=colour232,bold"
set -g status-right " C-a: [|]vsplit [-]hsplit [hjkl]nav [x]kill [c]win [?]help "
set -g status-right-length 65
set -g status-right-style "fg=colour244"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bg=colour232,fg=colour39,bold"

# === Help popup (C-a ?) ===
bind ? display-popup -E -w 52 -h 22 "printf '\
\n\033[1;33m=== tmux キー一覧 (prefix: C-a) ===\033[0m\n\
\n\033[1;36m[ ペイン操作 ]\033[0m\n\
  C-a |     垂直分割（左右）\n\
  C-a -     水平分割（上下）\n\
  C-a hjkl  ペイン移動（vim風）\n\
  C-a HJKL  ペインリサイズ\n\
  C-a x     ペイン削除\n\
\n\033[1;36m[ ウィンドウ操作 ]\033[0m\n\
  C-a c     新規ウィンドウ\n\
  C-a n/p   次/前のウィンドウ\n\
  C-a 1-9   番号で移動\n\
\n\033[1;36m[ セッション ]\033[0m\n\
  C-a d     デタッチ\n\
  C-a s     セッション一覧\n\
  C-a [     コピーモード（q終了）\n\
\n\033[2mPress any key to close...\033[0m\n\
' && read -n1"

# === Misc ===
set -sg escape-time 0
